name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and demo security gate
        run: |
          python -m pip install --upgrade pip
          python -m pip install "verity-core @ git+https://github.com/StellarRequiem/verity-core"
          python -m pip install "aisec-check @ git+https://github.com/StellarRequiem/aisec-check"
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest

      - name: List dimensions
        run: verify-suite dimensions

      - name: Run sample app check
        run: |
          set +e
          verify-suite check demo/sample_app
          code=$?
          set -e
          if [ "$code" -ne 2 ]; then
            echo "Expected demo/sample_app to exit 2 because it contains planted high-severity security leads; got $code"
            exit 1
          fi

      - name: Verify demo outputs exist
        run: |
          test -f demo/sample_app/verify-suite-report.md
          test -f demo/sample_app/verify-suite-receipt.json
          test -f demo/sample_app/verify-suite-audit.jsonl
